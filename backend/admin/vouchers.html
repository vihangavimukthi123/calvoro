<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Vouchers - Calvoro Admin</title>
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="logo">
                <a href="dashboard.html" style="display:flex;align-items:center;text-decoration:none;color:inherit;">
                    <img src="/logo.png" alt="CALVORO" style="height:36px;width:auto;object-fit:contain;">
                </a>
            </div>
            <nav class="nav">
                <a href="dashboard.html">📊 Dashboard</a>
                <a href="analytics.html">📈 Analytics</a>
                <a href="products.html">📦 Products</a>
                <a href="trending.html">🔥 Trending Now</a>
                <a href="categories.html">📁 Categories</a>
                <a href="orders.html">🛒 Orders</a>
                <a href="users.html">👥 Users</a>
                <a href="vouchers.html" class="active">🎁 Vouchers</a>
                <a href="promotions.html">📣 Promo Popup</a>
                <a href="offers.html">🏷️ Offers Engine</a>
                <a href="emails.html">📩 Email System</a>
                <a href="settings.html">⚙️ Settings</a>
                <a href="#" id="logoutBtn">🚪 Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h1>Gift Vouchers</h1>
                <div>
                    <button class="btn-secondary" onclick="showBulkModal()">Bulk Generate</button>
                    <button class="btn-primary" onclick="showAddModal()">+ Add Voucher</button>
                </div>
            </header>

            <div class="content">
                <div class="card">
                    <div class="table-container">
                        <table id="vouchersTable">
                            <thead>
                                <tr>
                                    <th>Code</th>
                                    <th>Type</th>
                                    <th>Value</th>
                                    <th>Min cart</th>
                                    <th>Expiry</th>
                                    <th>Usage</th>
                                    <th>Active</th>
                                    <th>Created</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr><td colspan="9" class="text-center">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Voucher Modal -->
    <div id="voucherModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="voucherModalTitle">Add Voucher</h2>
                <button class="close-btn" onclick="closeVoucherModal()">&times;</button>
            </div>
            <form id="voucherForm">
                <input type="hidden" id="voucherId">
                <div class="form-group">
                    <label>Code (leave blank to auto-generate)</label>
                    <input type="text" id="voucherCode" placeholder="e.g. SAVE20">
                </div>
                <div class="form-group">
                    <label>Discount type</label>
                    <select id="voucherDiscountType">
                        <option value="fixed_amount">Fixed amount (LKR)</option>
                        <option value="percentage">Percentage (%)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Discount value *</label>
                    <input type="number" id="voucherDiscountValue" min="0" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Min cart value (LKR)</label>
                    <input type="number" id="voucherMinCart" min="0" value="0" step="1">
                </div>
                <div class="form-group">
                    <label>Expiry date (optional)</label>
                    <input type="date" id="voucherExpiry">
                </div>
                <div class="form-group">
                    <label>Usage limit (total, empty = unlimited)</label>
                    <input type="number" id="voucherUsageLimit" min="1" placeholder="Unlimited">
                </div>
                <div class="form-group">
                    <label>Uses per user (empty = unlimited)</label>
                    <input type="number" id="voucherPerUser" min="1" placeholder="Unlimited">
                </div>
                <div class="form-group">
                    <label><input type="checkbox" id="voucherActive" checked> Active</label>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeVoucherModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save Voucher</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Bulk Generate Modal -->
    <div id="bulkModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Bulk Generate Vouchers</h2>
                <button class="close-btn" onclick="closeBulkModal()">&times;</button>
            </div>
            <form id="bulkForm">
                <div class="form-group">
                    <label>Number of codes *</label>
                    <input type="number" id="bulkCount" min="1" max="100" value="10" required>
                </div>
                <div class="form-group">
                    <label>Discount type</label>
                    <select id="bulkDiscountType">
                        <option value="fixed_amount">Fixed amount (LKR)</option>
                        <option value="percentage">Percentage (%)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Discount value *</label>
                    <input type="number" id="bulkDiscountValue" min="0" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Min cart value (LKR)</label>
                    <input type="number" id="bulkMinCart" min="0" value="0" step="1">
                </div>
                <div class="form-group">
                    <label>Expiry date (optional)</label>
                    <input type="date" id="bulkExpiry">
                </div>
                <div class="form-group">
                    <label>Usage limit per code (empty = unlimited)</label>
                    <input type="number" id="bulkUsageLimit" min="1" placeholder="Unlimited">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeBulkModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Generate</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <script>
        (async function() {
            const ok = await checkAuth();
            if (ok) loadVouchers();
        })();

        let vouchers = [];

        async function loadVouchers() {
            try {
                const res = await fetch('/api/vouchers');
                vouchers = await res.json();
                renderVouchers();
            } catch (e) {
                console.error(e);
                document.querySelector('#vouchersTable tbody').innerHTML =
                    '<tr><td colspan="9" class="text-center">Failed to load vouchers.</td></tr>';
            }
        }

        function renderVouchers() {
            const tbody = document.querySelector('#vouchersTable tbody');
            if (!vouchers.length) {
                tbody.innerHTML = '<tr><td colspan="9" class="text-center">No vouchers yet. Create one or bulk generate.</td></tr>';
                return;
            }
            tbody.innerHTML = vouchers.map(v => {
                const usage = v.usage_limit != null ? v.used_count + ' / ' + v.usage_limit : v.used_count + ' / ∞';
                const expiry = v.expiry_date ? new Date(v.expiry_date).toLocaleDateString() : '—';
                const valueStr = v.discount_type === 'percentage' ? v.discount_value + '%' : 'LKR ' + v.discount_value;
                return `<tr>
                    <td><code>${v.code}</code></td>
                    <td>${v.discount_type === 'percentage' ? 'Percentage' : 'Fixed'}</td>
                    <td>${valueStr}</td>
                    <td>${v.min_cart_value ? 'LKR ' + Number(v.min_cart_value).toLocaleString() : '—'}</td>
                    <td>${expiry}</td>
                    <td>${usage}</td>
                    <td>${v.is_active ? '✓' : '—'}</td>
                    <td>${v.created_at ? new Date(v.created_at).toLocaleDateString() : '—'}</td>
                    <td>
                        <button class="btn-sm" onclick="editVoucher(${v.id})">Edit</button>
                        <button class="btn-sm btn-danger" onclick="deleteVoucher(${v.id}, '${v.code.replace(/'/g, "\\'")}')">Delete</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function showAddModal() {
            document.getElementById('voucherModalTitle').textContent = 'Add Voucher';
            document.getElementById('voucherForm').reset();
            document.getElementById('voucherId').value = '';
            document.getElementById('voucherActive').checked = true;
            document.getElementById('voucherModal').classList.add('active');
        }

        function editVoucher(id) {
            const v = vouchers.find(x => x.id === id);
            if (!v) return;
            document.getElementById('voucherModalTitle').textContent = 'Edit Voucher';
            document.getElementById('voucherId').value = v.id;
            document.getElementById('voucherCode').value = v.code || '';
            document.getElementById('voucherCode').readOnly = true;
            document.getElementById('voucherDiscountType').value = v.discount_type || 'fixed_amount';
            document.getElementById('voucherDiscountValue').value = v.discount_value;
            document.getElementById('voucherMinCart').value = v.min_cart_value || 0;
            document.getElementById('voucherExpiry').value = v.expiry_date ? v.expiry_date.slice(0, 10) : '';
            document.getElementById('voucherUsageLimit').value = v.usage_limit != null ? v.usage_limit : '';
            document.getElementById('voucherPerUser').value = v.use_per_user_limit != null ? v.use_per_user_limit : '';
            document.getElementById('voucherActive').checked = !!v.is_active;
            document.getElementById('voucherModal').classList.add('active');
        }

        function closeVoucherModal() {
            document.getElementById('voucherModal').classList.remove('active');
            document.getElementById('voucherCode').readOnly = false;
        }

        document.getElementById('voucherForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('voucherId').value;
            const payload = {
                code: document.getElementById('voucherCode').value.trim(),
                discount_type: document.getElementById('voucherDiscountType').value,
                discount_value: document.getElementById('voucherDiscountValue').value,
                min_cart_value: document.getElementById('voucherMinCart').value || 0,
                expiry_date: document.getElementById('voucherExpiry').value || null,
                usage_limit: document.getElementById('voucherUsageLimit').value || null,
                use_per_user_limit: document.getElementById('voucherPerUser').value || null,
                is_active: document.getElementById('voucherActive').checked
            };
            try {
                const url = id ? '/api/vouchers/' + id : '/api/vouchers';
                const res = await fetch(url, {
                    method: id ? 'PUT' : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (res.ok) {
                    alert(id ? 'Voucher updated.' : 'Voucher created.');
                    closeVoucherModal();
                    loadVouchers();
                } else {
                    alert(data.error || 'Failed to save.');
                }
            } catch (err) {
                alert('Connection error.');
            }
        });

        async function deleteVoucher(id, code) {
            if (!confirm('Delete voucher "' + code + '"?')) return;
            try {
                const res = await fetch('/api/vouchers/' + id, { method: 'DELETE' });
                const data = await res.json();
                if (res.ok) {
                    alert('Voucher deleted.');
                    loadVouchers();
                } else {
                    alert(data.error || 'Delete failed.');
                }
            } catch (err) {
                alert('Connection error.');
            }
        }

        function showBulkModal() {
            document.getElementById('bulkForm').reset();
            document.getElementById('bulkCount').value = 10;
            document.getElementById('bulkModal').classList.add('active');
        }

        function closeBulkModal() {
            document.getElementById('bulkModal').classList.remove('active');
        }

        document.getElementById('bulkForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                count: parseInt(document.getElementById('bulkCount').value, 10),
                discount_type: document.getElementById('bulkDiscountType').value,
                discount_value: document.getElementById('bulkDiscountValue').value,
                min_cart_value: document.getElementById('bulkMinCart').value || 0,
                expiry_date: document.getElementById('bulkExpiry').value || null,
                usage_limit: document.getElementById('bulkUsageLimit').value || null
            };
            try {
                const res = await fetch('/api/vouchers/bulk', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (res.ok) {
                    alert('Created ' + (data.created && data.created.length) + ' voucher(s).');
                    closeBulkModal();
                    loadVouchers();
                } else {
                    alert(data.error || 'Bulk create failed.');
                }
            } catch (err) {
                alert('Connection error.');
            }
        });
    </script>
</body>

</html>
