<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - Calvoro Admin</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="logo">
                <a href="dashboard.html" style="display:flex;align-items:center;text-decoration:none;color:inherit;">
                    <img src="/logo.png" alt="CALVORO" style="height:36px;width:auto;object-fit:contain;">
                </a>
            </div>
            <nav class="nav">
                <a href="dashboard.html">📊 Dashboard</a>
                <a href="analytics.html">📈 Analytics</a>
                <a href="products.html">📦 Products</a>
                <a href="trending.html">🔥 Trending Now</a>
                <a href="categories.html">📁 Categories</a>
                <a href="orders.html">🛒 Orders</a>
                <a href="users.html" class="active">👥 Users</a>
                <a href="vouchers.html">🎁 Vouchers</a>
                <a href="promotions.html">📣 Promo Popup</a>
                <a href="offers.html">🏷️ Offers Engine</a>
                <a href="emails.html">📩 Email System</a>
                <a href="settings.html">⚙️ Settings</a>
                <a href="#" id="logoutBtn">🚪 Logout</a>
            </nav>
        </aside>
        <main class="main-content">
            <header class="top-bar">
                <h1>Users</h1>
                <div>
                    <button class="btn-primary" onclick="showAddUserModal()">+ Add User</button>
                    <button class="btn-primary" onclick="showAddAdminModal()" style="background:#4f46e5;margin-left:8px;">+ Add Admin</button>
                </div>
            </header>
            <div class="content">
                <div class="filters" style="display:flex;gap:16px;align-items:center;">
                    <input type="search" id="searchUsers" placeholder="Search users by email or name..." class="search-input" style="flex:1;">
                    <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer;white-space:nowrap;">
                        <input type="checkbox" id="filterDonors" style="width:16px;height:16px;"> 
                        <span>💎 Show Donors Only</span>
                    </label>
                </div>
                <div class="card">
                    <div class="table-container">
                        <table id="usersTable">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Email</th>
                                    <th>Name</th>
                                    <th>Phone</th>
                                    <th>Donations</th>
                                    <th>Joined</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr><td colspan="6" class="text-center">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add User Modal -->
    <div id="addUserModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add User</h2>
                <button class="close-btn" onclick="closeAddUserModal()">&times;</button>
            </div>
            <form id="addUserForm" style="padding: 24px;">
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" name="email" required placeholder="user@example.com">
                </div>
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" name="password" required placeholder="Min 6 characters">
                </div>
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="first_name" placeholder="John">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" name="last_name" placeholder="Doe">
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" name="phone" placeholder="+94 77 123 4567">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <textarea name="address" rows="2" placeholder="Street, City"></textarea>
                </div>
                <div class="form-group">
                    <label>City</label>
                    <input type="text" name="city" placeholder="Colombo">
                </div>
                <button type="submit" class="btn-primary">Create User</button>
            </form>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div id="editUserModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit User</h2>
                <button class="close-btn" onclick="closeEditUserModal()">&times;</button>
            </div>
            <form id="editUserForm" style="padding: 24px;">
                <input type="hidden" name="id">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" readonly disabled style="background:#eee;">
                </div>
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="first_name">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" name="last_name">
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" name="phone">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <textarea name="address" rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label>City</label>
                    <input type="text" name="city">
                </div>
                <button type="submit" class="btn-primary">Save Changes</button>
            </form>
        </div>
    </div>

    <!-- Add Admin Modal -->
    <div id="addAdminModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add Administrator</h2>
                <button class="close-btn" onclick="closeAddAdminModal()">&times;</button>
            </div>
            <form id="addAdminForm" style="padding: 24px;">
                <div class="form-group">
                    <label>Username *</label>
                    <input type="text" name="username" required placeholder="admin_john">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="admin@example.com">
                </div>
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" name="password" required placeholder="Min 6 characters">
                </div>
                <button type="submit" class="btn-primary" style="background:#4f46e5;">Create Admin</button>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <script>
        let users = [];

        async function loadUsers() {
            try {
                const res = await fetch('/api/admin/users');
                if (!res.ok) throw new Error('Failed to load');
                users = await res.json();
                renderUsers();
            } catch (e) {
                document.querySelector('#usersTable tbody').innerHTML = '<tr><td colspan="6" class="text-center">Error loading users</td></tr>';
            }
        }

        function renderUsers() {
            const q = (document.getElementById('searchUsers').value || '').toLowerCase();
            const donorOnly = document.getElementById('filterDonors').checked;

            let filtered = users;
            
            if (q) {
                filtered = filtered.filter(u =>
                    (u.email || '').toLowerCase().includes(q) ||
                    ((u.first_name || '') + ' ' + (u.last_name || '')).toLowerCase().includes(q)
                );
            }
            
            if (donorOnly) {
                filtered = filtered.filter(u => u.is_donor);
            }

            const tbody = document.querySelector('#usersTable tbody');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center">No users found</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(u => {
                const name = [u.first_name, u.last_name].filter(Boolean).join(' ') || '-';
                const date = u.created_at ? new Date(u.created_at).toLocaleDateString() : '-';
                const donorBadge = u.is_donor ? 
                    `<div style="display:flex;flex-direction:column;">
                        <span style="color:#d97706;font-weight:bold;font-size:12px;">💎 DONOR</span>
                        <span style="font-size:11px;color:#059669;">LKR ${u.total_donated.toLocaleString()}</span>
                    </div>` : 
                    `<span style="color:#94a3b8;font-size:12px;">-</span>`;
                    
                return `<tr>
                    <td>${u.id}</td>
                    <td>${escapeHtml(u.email || '')}</td>
                    <td>${escapeHtml(name)}</td>
                    <td>${escapeHtml(u.phone || '-')}</td>
                    <td>${donorBadge}</td>
                    <td>${date}</td>
                    <td>
                        <button class="btn-sm" onclick="editUser(${u.id})">Edit</button>
                        <button class="btn-sm btn-delete" style="color:#dc2626;margin-left:8px;" data-id="${u.id}" data-email="${escapeHtml(u.email || '')}">Delete</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function showAddUserModal() {
            document.getElementById('addUserModal').classList.add('active');
            document.getElementById('addUserForm').reset();
        }

        function closeAddUserModal() {
            document.getElementById('addUserModal').classList.remove('active');
        }

        function closeEditUserModal() {
            document.getElementById('editUserModal').classList.remove('active');
        }

        document.getElementById('addUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const data = Object.fromEntries(fd);
            try {
                const res = await fetch('/api/admin/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const json = await res.json();
                if (res.ok) {
                    showNotification('User created successfully');
                    closeAddUserModal();
                    loadUsers();
                } else {
                    showNotification(json.error || 'Failed to create user', 'error');
                }
            } catch (err) {
                showNotification('Error creating user', 'error');
            }
        });

        function showAddAdminModal() {
            document.getElementById('addAdminModal').classList.add('active');
            document.getElementById('addAdminForm').reset();
        }

        function closeAddAdminModal() {
            document.getElementById('addAdminModal').classList.remove('active');
        }

        document.getElementById('addAdminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const data = Object.fromEntries(fd);
            try {
                const res = await fetch('/api/admin/users/admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const json = await res.json();
                if (res.ok) {
                    showNotification('Admin created successfully');
                    closeAddAdminModal();
                } else {
                    showNotification(json.error || 'Failed to create admin', 'error');
                }
            } catch (err) {
                showNotification('Error creating admin', 'error');
            }
        });

        function editUser(id) {
            const u = users.find(x => x.id == id);
            if (!u) return;
            const f = document.getElementById('editUserForm');
            f.querySelector('[name=id]').value = u.id;
            f.querySelector('[name=email]').value = u.email || '';
            f.querySelector('[name=first_name]').value = u.first_name || '';
            f.querySelector('[name=last_name]').value = u.last_name || '';
            f.querySelector('[name=phone]').value = u.phone || '';
            f.querySelector('[name=address]').value = u.address || '';
            f.querySelector('[name=city]').value = u.city || '';
            document.getElementById('editUserModal').classList.add('active');
        }

        document.getElementById('editUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const id = fd.get('id');
            const data = {
                first_name: fd.get('first_name'),
                last_name: fd.get('last_name'),
                phone: fd.get('phone'),
                address: fd.get('address'),
                city: fd.get('city')
            };
            try {
                const res = await fetch('/api/admin/users/' + id, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const json = await res.json();
                if (res.ok) {
                    showNotification('User updated');
                    closeEditUserModal();
                    loadUsers();
                } else {
                    showNotification(json.error || 'Failed to update', 'error');
                }
            } catch (err) {
                showNotification('Error updating user', 'error');
            }
        });

        async function deleteUser(id, email) {
            if (!confirm('Delete user "' + email + '"?')) return;
            try {
                const res = await fetch('/api/admin/users/' + id, { method: 'DELETE' });
                const json = await res.json();
                if (res.ok) {
                    showNotification('User deleted');
                    loadUsers();
                } else {
                    showNotification(json.error || 'Failed to delete', 'error');
                }
            } catch (err) {
                showNotification('Error deleting user', 'error');
            }
        }

        document.getElementById('searchUsers').addEventListener('input', () => renderUsers());
        document.getElementById('filterDonors').addEventListener('change', () => renderUsers());

        document.querySelector('#usersTable').addEventListener('click', (e) => {
            const btn = e.target.closest('.btn-delete');
            if (btn) deleteUser(btn.dataset.id, btn.dataset.email);
        });

        (async function() {
            const ok = await checkAuth();
            if (ok) loadUsers();
        })();
    </script>
</body>
</html>
