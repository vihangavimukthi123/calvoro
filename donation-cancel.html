<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donation Cancelled - CALVORO</title>
    <script>(function(){var v=localStorage.getItem('calvoro_theme');var dark=v==='dark'||(!v&&window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.setAttribute('data-theme',dark?'dark':'light');})();</script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .donation-result { max-width: 760px; margin: 0 auto; padding: 64px 24px 80px; text-align:center; }
        .donation-muted { color: var(--color-text-muted); font-size: 13px; line-height: 1.5; }
        .donation-actions { margin-top: 22px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
        .btn { display:inline-block; padding: 12px 18px; border-radius: 12px; text-decoration:none; font-weight:800; letter-spacing:0.04em; text-transform:uppercase; font-size:12px; }
        .btn-primary { background: var(--color-btn-bg); color: var(--color-btn-text); }
        .btn-secondary { background: transparent; color: var(--color-text); border: 1px solid var(--color-border); }
    </style>
</head>
<body>
    <div class="promo">FREE SHIPPING ON ORDERS OVER LKR 15,000</div>
    <header class="header">
        <div class="container">
            <div class="logo"><a href="index.html"><img src="logo.png" alt="CALVORO"></a></div>
            <nav><a href="men.html">MEN</a><a href="women.html">WOMEN</a><a href="gifts.html">GIFT VOUCHERS</a></nav>
        </div>
    </header>

    <main class="donation-result">
        <h1>Donation cancelled</h1>
        <p class="donation-muted">No worries — your card was not charged. You can try again anytime.</p>
        <div class="donation-actions">
            <a class="btn btn-primary" href="index.html">Back to home</a>
            <a class="btn btn-secondary" href="index.html#donate">Donate again</a>
        </div>
    </main>

    <script src="js/main.js?v=2"></script>
</body>
</html>
